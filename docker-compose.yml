# Local development stack: Next.js (hot reload) + PostgreSQL + Redis.
#
#   docker compose up            # everything
#   docker compose up db redis   # only backing services (run `npm run dev` on the host)

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://assetradar:assetradar@db:5432/assetradar
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: assetradar
      POSTGRES_PASSWORD: assetradar
      POSTGRES_DB: assetradar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetradar -d assetradar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
